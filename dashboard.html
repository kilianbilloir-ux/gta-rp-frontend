<div class="container main-content">



<div class="dashboard-header">



<div class="header-left">


<h1>
Tableau de Bord
</h1>


<p id="userGreeting">
Bienvenue
</p>


</div>





<div class="header-right">


<div class="user-info-card">


<div class="user-avatar">
👤
</div>



<div class="user-details">


<p id="profileUsername">
-
</p>


<p id="profileGrade">
-
</p>


</div>


</div>


</div>



</div>





<div 
id="messageBox"
class="message-box hidden">
</div>







<!-- STATISTIQUES -->


<div class="stats-grid">



<div class="stat-card">

<div class="stat-header">

<span class="stat-icon">
💰
</span>

<span class="stat-label">
Bénéfices personnels
</span>

</div>


<div 
class="stat-value"
id="personalGains">

0 $

</div>


</div>






<div class="stat-card">


<div class="stat-header">

<span class="stat-icon">
📊
</span>

<span class="stat-label">
Actions
</span>

</div>


<div 
class="stat-value"
id="actionsTotal">

0 $

</div>


</div>







<div class="stat-card">


<div class="stat-header">

<span class="stat-icon">
🔫
</span>

<span class="stat-label">
Braquages
</span>

</div>



<div 
class="stat-value"
id="braquagesTotal">

0 $

</div>



</div>








<div class="stat-card">


<div class="stat-header">

<span class="stat-icon">
🛒
</span>


<span class="stat-label">
Ventes
</span>


</div>



<div 
class="stat-value"
id="ventesTotal">

0 $

</div>


</div>



</div>









<!-- AJOUT ACTIVITE -->


<section class="section">


<div class="section-header">


<h2>
Ajouter une activité financière
</h2>


</div>





<form 
id="addEntryForm"
class="form-container">






<div class="form-row">





<div class="form-group">


<label>
Catégorie
</label>



<select 
id="entryCategory"
required>


<option value="">
-- Choisir --
</option>


<option value="action">
Action
</option>


<option value="braquage">
Braquage
</option>


<option value="vente">
Vente
</option>



</select>


</div>







<div class="form-group">


<label>
Montant ($)
</label>



<input

type="number"

id="entryAmount"

placeholder="5000"

min="1"

required

>


</div>





</div>








<div class="form-group">


<label>
Sous-catégorie
</label>



<select id="entrySubtype">



<option value="">
-- Choisir --
</option>



<option value="ATM">
ATM
</option>



<option value="Go Fast">
Go Fast
</option>



<option value="Supérette">
Supérette
</option>



<option value="Banque">
Banque
</option>



<option value="Autre">
Autre
</option>



</select>


</div>








<div class="form-group">


<label>
Produit (vente uniquement)
</label>



<input

type="text"

id="entryProduct"

placeholder="Produit vendu"

>


</div>








<div class="form-group">


<label>
Quantité
</label>



<input

type="number"

id="entryQuantity"

value="1"

min="1"

>


</div>









<button

type="submit"

class="btn btn-primary">


Ajouter l'activité


</button>






</form>



</section>









<!-- HISTORIQUE -->


<section class="section">


<div class="section-header">


<h2>
Historique des activités
</h2>



<button

id="refreshBtn"

class="btn btn-small">


Actualiser


</button>



</div>





<div

id="entriesList"

class="entries-list">


<p>
Chargement...
</p>


</div>



</section>








</div>

<div class="container">


<p>

</p>


</div>


</footer>
