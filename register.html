<!DOCTYPE html>
<html lang="fr">


<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <title>Inscription - GTA RP ORG</title>


    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet" href="css/login.css">


</head>





<body class="dark-theme">





<nav class="navbar">


<div class="nav-container">


    <div class="nav-logo">


        <a href="index.html">


            <span class="logo-icon">

                🏢

            </span>


            <span>

                GTA RP ORG

            </span>


        </a>


    </div>



</div>


</nav>









<div class="auth-container">


<div class="auth-box">






<div class="auth-header">


<h1>

Inscription

</h1>


<p>

Créez votre compte

</p>


</div>









<div
id="messageBox"
class="message-box hidden">

</div>









<form

id="registerForm"

class="auth-form"

>









<div class="form-group">


<label for="username">

Pseudo

</label>




<input

type="text"

id="username"

name="username"

placeholder="Choisissez votre pseudo"

required

minlength="3"

maxlength="20"

autocomplete="username"

>



<small>

3-20 caractères

</small>



</div>









<div class="form-group">


<label for="pin">

PIN (4 chiffres)

</label>




<input

type="password"

id="pin"

name="pin"

placeholder="••••"

maxlength="4"

pattern="[0-9]{4}"

required

autocomplete="new-password"

>




<small>

Créez un PIN de 4 chiffres

</small>



</div>









<div class="form-group">


<label for="confirmPin">

Confirmer le PIN

</label>




<input

type="password"

id="confirmPin"

name="confirmPin"

placeholder="••••"

maxlength="4"

pattern="[0-9]{4}"

required

autocomplete="new-password"

>



</div>









<button

type="submit"

class="btn btn-primary btn-full">


Créer mon compte


</button>









</form>









<div class="auth-footer">


<p>


Vous avez déjà un compte ?

<a href="login.html">

Se connecter

</a>


</p>


</div>









<div class="auth-back">


<a href="index.html">

← Retour à l'accueil

</a>


</div>








</div>


</div>









<script src="js/utils.js"></script>

<script src="js/api.js"></script>

<script src="js/auth.js"></script>





</body>


</html>
