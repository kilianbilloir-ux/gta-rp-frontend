<main class="auth-page">


<div class="auth-card">



<h2>
Créer un compte
</h2>

Rejoignez une organisation GTA RP
</p>





<form>



<div class="field">

<label>
Nom d'utilisateur
</label>

<input 
type="text"
placeholder="Votre pseudo">

<label>
Email
</label>

placeholder="Votre email">

</div>





<div class="field">

<label>
Mot de passe
</label>

<input type="password" placeholder="Code à 4 chiffres" maxlength="4" pattern="[0-9]{4}">

Créer mon compte

</button>



</form>
