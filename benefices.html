<div class="content">


<header class="topbar">

<span class="brand">
<span class="brand-mark">G</span> GTA RP ORG
</span>

</header>





<main class="page">


<div class="page-header">

<h1>Ajouter un bénéfice</h1>

<p>
Enregistre les revenus de ton organisation.
</p>

</div>




<div class="card">



<div class="field">

<label>Catégorie</label>

<select id="categorie" class="search-input">

<option value="">
Choisir une catégorie
</option>

<option value="actions">
Actions
</option>

<option value="ventes">
Ventes
</option>

<option value="braquage">
Braquage
</option>


</select>

</div>





<div class="field">

<label>Activité</label>


<select id="activite" class="search-input">

<option>
Choisir une catégorie
</option>


</select>


</div>





<div class="field" id="quantiteBox">

<label>Quantité vendue</label>

<input 
id="quantite"
class="search-input"
type="number"
placeholder="Ex : 10">

</div>





<div class="field">

<label>Argent récolté</label>


<input 
class="search-input"
type="number"
placeholder="Ex : 5000">


</div>





<button class="btn btn-primary btn-block">

Ajouter le bénéfice

</button>



</div>



</main>


</div>


</div>






<script>


const categorie = document.getElementById("categorie");

const activite = document.getElementById("activite");

const quantiteBox = document.getElementById("quantiteBox");





const listes = {


actions:[

"ATM",

"Go Fast",

"Cambu"

],


ventes:[

"Crack",

"Cannabis",

"Cocaïne",

"Héroïne",

"Spore X",

"Carte prépayée",

"Tranq",

"Meth",

"Purple",

"Mecicana",

"Ecstasy",

"Lean",

"B-Magic"

],


braquage:[

"Supérette",

"Fleeca",

"Armurerie"

]


};







categorie.addEventListener("change",()=>{


activite.innerHTML="";


let choix = listes[categorie.value];



choix.forEach(element=>{


let option=document.createElement("option");

option.textContent=element;

activite.appendChild(option);


});





if(categorie.value==="ventes"){


quantiteBox.style.display="block";


}else{


quantiteBox.style.display="none";


}


});




</script>
